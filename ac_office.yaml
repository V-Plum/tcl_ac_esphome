substitutions:
  friendly_name: Office AC

esphome:
  name: tcl-ac
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true

esp8266:
  board: esp01_1m

logger:
  baud_rate: 0

api:
  encryption:
    key: !secret tcl_ac_api_key

ota:
  - platform: esphome
    password: !secret tcl_ac_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: 192.168.50.108
  ap:
    ssid: "TCL AC Setup"
    password: !secret tcl_ac_fallback_password

captive_portal:

uart:
  id: ac_uart
  tx_pin: GPIO1
  rx_pin: GPIO3
  baud_rate: 9600
  data_bits: 8
  parity: EVEN
  stop_bits: 1

external_components:
  - source: github://V-Plum/tcl_ac_esphome@master
    components: [tcl_ac]
    refresh: 0s

climate:
  - platform: tcl_ac
    name: "Кондиціонер"
    object_id: air_conditioner
    id: ac
    uart_id: ac_uart

switch:
  - platform: tcl_ac
    name: "Дисплей"
    object_id: display
    id: ac_display
    tcl_ac_id: ac
    type: display
    icon: mdi:television-ambient-light
    restore_mode: RESTORE_DEFAULT_ON

  - platform: tcl_ac
    name: "Звуковий сигнал"
    object_id: beeper
    id: ac_beeper
    tcl_ac_id: ac
    type: beeper
    icon: mdi:volume-high
    restore_mode: RESTORE_DEFAULT_ON

  - platform: tcl_ac
    name: "М'який вітер"
    object_id: gentle_wind
    id: ac_gentle_wind
    tcl_ac_id: ac
    type: gentle_wind
    icon: mdi:weather-windy
    restore_mode: RESTORE_DEFAULT_OFF

select:
  - platform: tcl_ac
    name: "Вертикальні жалюзі"
    object_id: vertical_louver
    id: ac_v_louver
    tcl_ac_id: ac
    type: vertical_louver
    icon: mdi:arrow-up-down

  - platform: tcl_ac
    name: "Горизонтальні жалюзі"
    object_id: horizontal_louver
    id: ac_h_louver
    tcl_ac_id: ac
    type: horizontal_louver
    icon: mdi:arrow-left-right

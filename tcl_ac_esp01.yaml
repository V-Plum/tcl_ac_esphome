substitutions:
  friendly_name: TCL Ocarina AC

esphome:
  name: tcl-ac
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true

esp8266:
  board: esp01_1m

# Serial logger disabled — ESP-01 GPIO1/GPIO3 are used by the AC UART
logger:
  baud_rate: 0

api:
  encryption:
    key: !secret tcl_ac_api_key

ota:
  - platform: esphome
    password: !secret tcl_ac_ota_password

wifi:
  # No hardcoded credentials: improv_serial or captive portal handles first-time setup
  ap:
    ssid: "TCL AC Setup"
    password: !secret tcl_ac_fallback_password

captive_portal:

# UART to the AC indoor unit — 9600 8E1, ESP-01 hardware UART pins
uart:
  id: ac_uart
  tx_pin: GPIO1
  rx_pin: GPIO3
  baud_rate: 9600
  data_bits: 8
  parity: EVEN
  stop_bits: 1

external_components:
  - source: github://V-Plum/tcl_ac_esphome
    components: [tcl_ac]

climate:
  - platform: tcl_ac
    name: "Air Conditioner"
    id: ac
    uart_id: ac_uart

switch:
  - platform: tcl_ac
    name: "Display"
    id: ac_display
    tcl_ac_id: ac
    type: display
    icon: mdi:television-ambient-light
    restore_mode: RESTORE_DEFAULT_ON

  - platform: tcl_ac
    name: "Beeper"
    id: ac_beeper
    tcl_ac_id: ac
    type: beeper
    icon: mdi:volume-high
    restore_mode: RESTORE_DEFAULT_ON

  - platform: tcl_ac
    name: "Gentle Wind"
    id: ac_gentle_wind
    tcl_ac_id: ac
    type: gentle_wind
    icon: mdi:weather-windy
    restore_mode: RESTORE_DEFAULT_OFF

select:
  - platform: tcl_ac
    name: "Vertical Louver"
    id: ac_v_louver
    tcl_ac_id: ac
    type: vertical_louver
    icon: mdi:arrow-up-down

  - platform: tcl_ac
    name: "Horizontal Louver"
    id: ac_h_louver
    tcl_ac_id: ac
    type: horizontal_louver
    icon: mdi:arrow-left-right
